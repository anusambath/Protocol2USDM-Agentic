# Protocol2USDM — Production Docker Compose
# Includes: app, Redis (Context Store), RabbitMQ (Message Queue),
#           Prometheus (metrics), Grafana (dashboards)

version: "3.9"

services:
  # ── Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2u-app
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://p2u:p2u_secret@rabbitmq:5672/
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_WORKERS=${MAX_WORKERS:-4}
      - OUTPUT_DIR=/app/output
      - CHECKPOINTS_DIR=/app/checkpoints
    volumes:
      - ./input:/app/input:ro
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - p2u-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"

  # ── Redis (Production Context Store) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: p2u-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2u-net

  # ── RabbitMQ (Production Message Queue) ──────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: p2u-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: p2u
      RABBITMQ_DEFAULT_PASS: p2u_secret
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2u-net

  # ── Prometheus (Metrics Collection) ──────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: p2u-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - p2u-net

  # ── Grafana (Dashboards) ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: p2u-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: p2u_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - p2u-net

volumes:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

networks:
  p2u-net:
    driver: bridge
