# Nginx reverse proxy with SSL/TLS termination for Protocol2USDM
# Place SSL certs in /etc/nginx/ssl/

upstream p2u_app {
    server app:8000;
}

upstream p2u_grafana {
    server grafana:3000;
}

upstream p2u_rabbitmq_mgmt {
    server rabbitmq:15672;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # App metrics/health
    location /metrics {
        proxy_pass http://p2u_app/metrics;
    }

    location /health {
        proxy_pass http://p2u_app/health;
    }

    # Grafana dashboards
    location /grafana/ {
        proxy_pass http://p2u_grafana/;
        proxy_set_header Host $host;
    }

    # RabbitMQ management (restricted)
    location /rabbitmq/ {
        proxy_pass http://p2u_rabbitmq_mgmt/;
        proxy_set_header Host $host;
    }
}
